input:
  data_dirs: [data/raw/dengue_related]
  glob: "**/*.pdf"

pdf:
  extractor: pymupdf
  max_chars: 60000

models:
  - name: gpt-4o
    provider: openai
    model_id: gpt-4o
    temperature: 0
    max_tokens: 4096
    input_cost_per_1k: 0.005
    output_cost_per_1k: 0.015
  - name: claude-sonnet
    provider: anthropic
    model_id: claude-sonnet-4-6
    temperature: 0
  - name: gemini-pro
    provider: google
    model_id: gemini-2.5-flash

run:
  max_retries: 3
  concurrency: 4
  output_dir: outputs/runs

prompt:
  system_path: src/epi_annotation/prompts/system.md
